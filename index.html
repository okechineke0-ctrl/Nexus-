<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Nexus Freight</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex items-center justify-center overflow-hidden">

  <!-- Background -->
  <div class="hero-bg absolute inset-0 z-0"></div>

  <div class="relative z-10 w-full max-w-md mx-auto px-5 py-6">
    
    <div class="login-card">
      
      <!-- Header -->
      <div class="flex flex-col items-center mb-6">
        <div class="logo-icon mb-2">
          <i class="fa-solid fa-ship text-3xl"></i>
        </div>
        <span class="heading-font text-3xl font-bold tracking-tight">Nexus Freight</span>
        <p class="text-zinc-400 text-xs mt-1 text-center">Global Shipping • Trusted Logistics</p>
      </div>

      <h1 class="text-2xl font-semibold text-center mb-1 heading-font">Welcome Back</h1>
      <p class="text-zinc-400 text-center mb-6 text-sm">Sign in to your dashboard</p>

      <!-- Form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="email" required class="form-input" placeholder="you@company.com">
          </div>
        </div>

        <div>
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="password" required class="form-input" placeholder="••••••••">
            <button type="button" id="togglePassword" class="toggle-password">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">
          <span id="btnText">Sign In</span>
          <span id="btnSpinner" class="hidden ml-2"><i class="fa-solid fa-spinner fa-spin"></i></span>
        </button>
      </form>

      <div class="mt-6 text-center text-xs text-zinc-500">
        New user? <a href="register.html" class="text-teal-400 hover:text-teal-300">Register</a>
      </div>
    </div>

    <!-- Trust -->
    <div class="text-center mt-6 text-[10px] text-zinc-500 flex justify-center gap-4">
      <span>🔒 Secure Login</span>
      <span>256-bit SSL</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
